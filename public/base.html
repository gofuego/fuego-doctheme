<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="{{.Site.BaseURL}}/">
    <title>{{.Page.Envelope.title}} — {{.Site.Name}}</title>
    <link rel="stylesheet" href="style.css">
    <link rel="alternate" type="application/rss+xml" title="{{.Site.Name}}" href="rss.xml">
</head>
<body>
{{partial "topbar" .}}
<div class="layout">
    {{partial "sidebar" .}}
    <main>
    {{block "content" .}}<div class="page">{{.Page.Content}}</div>{{end}}
    </main>
</div>
<footer>
    <p>Built with Fuego — the format-agnostic static site engine.</p>
</footer>
</body>
</html>
